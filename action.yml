name: ScopeTrail
description: Code review for AI agent permission drift in pull requests.

inputs:
  repo:
    description: Repository checkout path to inspect. Defaults to GITHUB_WORKSPACE.
    required: false
    default: ''
  base:
    description: Base git ref or SHA to compare from. Defaults to the pull request base SHA when available.
    required: false
    default: ''
  head:
    description: Head git ref or SHA to compare to. Defaults to the pull request head SHA when available.
    required: false
    default: ''
  fail-on:
    description: Severity that fails the action. Use none, low, medium, high, or critical.
    required: false
    default: none

outputs:
  rating:
    description: Highest ScopeTrail permission drift rating.
    value: ${{ steps.run.outputs.rating }}

runs:
  using: composite
  steps:
    - name: Install ScopeTrail
      shell: bash
      run: |
        set -euo pipefail
        cd "$GITHUB_ACTION_PATH"
        npm ci

    - name: Build ScopeTrail
      shell: bash
      run: |
        set -euo pipefail
        cd "$GITHUB_ACTION_PATH"
        npm run build

    - name: Run ScopeTrail permission drift review
      id: run
      shell: bash
      env:
        SCOPE_REPO: ${{ inputs.repo }}
        SCOPE_BASE: ${{ inputs.base }}
        SCOPE_HEAD: ${{ inputs.head }}
        SCOPE_FAIL_ON: ${{ inputs.fail-on }}
        DEFAULT_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        DEFAULT_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
      run: |
        set -euo pipefail

        repo="${SCOPE_REPO:-$GITHUB_WORKSPACE}"
        base="${SCOPE_BASE:-$DEFAULT_BASE}"
        head="${SCOPE_HEAD:-$DEFAULT_HEAD}"
        fail_on="${SCOPE_FAIL_ON:-none}"

        if [ -z "$base" ] || [ -z "$head" ]; then
          echo "::error::ScopeTrail needs base and head refs. Pass base/head inputs or run on pull_request with actions/checkout fetch-depth: 0."
          exit 2
        fi

        report_file="${RUNNER_TEMP:-.}/scopetrail-report.md"
        json_file="${RUNNER_TEMP:-.}/scopetrail-report.json"

        node "$GITHUB_ACTION_PATH/dist/index.js" diff --repo "$repo" --base "$base" --head "$head" --format markdown | tee "$report_file"
        node "$GITHUB_ACTION_PATH/dist/index.js" diff --repo "$repo" --base "$base" --head "$head" --format json > "$json_file"
        node "$GITHUB_ACTION_PATH/dist/index.js" diff --repo "$repo" --base "$base" --head "$head" --format github

        if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
          cat "$report_file" >> "$GITHUB_STEP_SUMMARY"
        fi

        rating="$(node -e "const fs = require('node:fs'); console.log(JSON.parse(fs.readFileSync(process.argv[1], 'utf8')).rating)" "$json_file")"
        echo "rating=$rating" >> "$GITHUB_OUTPUT"

        rank() {
          case "$1" in
            none) echo 0 ;;
            low) echo 1 ;;
            medium) echo 2 ;;
            high) echo 3 ;;
            critical) echo 4 ;;
            *) echo -1 ;;
          esac
        }

        fail_rank="$(rank "$fail_on")"
        rating_rank="$(rank "$rating")"

        if [ "$fail_rank" -lt 0 ]; then
          echo "::error::Invalid fail-on value '$fail_on'. Use none, low, medium, high, or critical."
          exit 2
        fi

        if [ "$fail_rank" -gt 0 ] && [ "$rating_rank" -ge "$fail_rank" ]; then
          echo "::error::ScopeTrail permission drift rating $rating meets fail-on threshold $fail_on."
          exit 1
        fi
