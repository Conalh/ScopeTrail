name: ScopeTrail
description: Code review for AI agent permission drift in pull requests.
author: Conal

branding:
  icon: shield
  color: gray-dark

inputs:
  repo:
    description: Repository checkout path to inspect. Defaults to GITHUB_WORKSPACE.
    required: false
    default: ''
  base:
    description: Base git ref or SHA to compare from. Defaults to the pull request base SHA when available.
    required: false
    default: ''
  head:
    description: Head git ref or SHA to compare to. Defaults to the pull request head SHA when available.
    required: false
    default: ''
  fail-on:
    description: Severity that fails the action. Use none, low, medium, high, or critical.
    required: false
    default: none
  include-samples:
    description: >-
      Also review sample/template/disabled MCP configs (.mcp.json.template, .sample, prefixed examples).
      Off by default because those files never load into an agent, so changes to them are not permission drift.
    required: false
    default: 'false'

outputs:
  rating:
    description: Highest ScopeTrail permission drift rating.
    value: ${{ steps.run.outputs.rating }}
  finding-count:
    description: Total ScopeTrail findings in the diff.
    value: ${{ steps.run.outputs.finding-count }}

runs:
  using: composite
  steps:
    - name: Install ScopeTrail dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm ci --omit=dev --no-audit --no-fund
    - name: Run ScopeTrail permission drift review
      id: run
      shell: bash
      env:
        SCOPE_REPO: ${{ inputs.repo }}
        SCOPE_BASE: ${{ inputs.base }}
        SCOPE_HEAD: ${{ inputs.head }}
        SCOPE_FAIL_ON: ${{ inputs.fail-on }}
        SCOPE_INCLUDE_SAMPLES: ${{ inputs.include-samples }}
        DEFAULT_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        DEFAULT_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
      run: |
        set -euo pipefail

        repo="${SCOPE_REPO:-$GITHUB_WORKSPACE}"
        base="${SCOPE_BASE:-$DEFAULT_BASE}"
        head="${SCOPE_HEAD:-$DEFAULT_HEAD}"
        fail_on="${SCOPE_FAIL_ON:-none}"

        # Optional opt-in: review sample/template/disabled MCP configs too.
        # Empty unless requested, so the unquoted expansion below adds no arg.
        include_samples=""
        if [ "${SCOPE_INCLUDE_SAMPLES:-false}" = "true" ]; then
          include_samples="--include-samples"
        fi

        if [ -z "$base" ] || [ -z "$head" ]; then
          echo "::error::ScopeTrail needs base and head refs. Pass base/head inputs or run on pull_request with actions/checkout fetch-depth: 0."
          exit 2
        fi

        report_file="${RUNNER_TEMP:-.}/scopetrail-report.md"
        json_file="${RUNNER_TEMP:-.}/scopetrail-report.json"

        # Single scan: stdout streams GitHub annotations so the runner
        # picks up ::warning lines, while --out-markdown and --out-json
        # capture the other two renderings from the same run. The CLI
        # itself enforces --fail-on (exit 1) so we don't reimplement
        # the rank table in bash. Capture the CLI status without
        # `set -e` halting before outputs are written.
        set +e
        node "$GITHUB_ACTION_PATH/dist/index.js" diff \
          --repo "$repo" --base "$base" --head "$head" \
          --format github \
          --out-markdown "$report_file" \
          --out-json "$json_file" \
          --fail-on "$fail_on" \
          $include_samples
        cli_status=$?
        set -e

        # Surface the markdown report in the Action log for parity
        # with the prior `tee` of `--format markdown`.
        if [ -f "$report_file" ]; then
          cat "$report_file"
          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat "$report_file" >> "$GITHUB_STEP_SUMMARY"
          fi
        fi

        if [ -f "$json_file" ]; then
          rating="$(node -e "const fs = require('node:fs'); console.log(JSON.parse(fs.readFileSync(process.argv[1], 'utf8')).rating)" "$json_file")"
          finding_count="$(node -e "const fs = require('node:fs'); console.log(JSON.parse(fs.readFileSync(process.argv[1], 'utf8')).findings.length)" "$json_file")"
          echo "rating=$rating" >> "$GITHUB_OUTPUT"
          echo "finding-count=$finding_count" >> "$GITHUB_OUTPUT"
        fi

        if [ "$cli_status" -eq 1 ]; then
          echo "::error::ScopeTrail permission drift rating ${rating:-unknown} meets fail-on threshold $fail_on."
        fi
        exit "$cli_status"
