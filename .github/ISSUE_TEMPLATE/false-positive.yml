name: Detector false positive
description: Report a ScopeTrail finding that should be quieter or more precise.
title: "[false positive]: "
labels: ["detector", "false-positive"]
body:
  - type: textarea
    id: finding
    attributes:
      label: Finding
      description: Paste the ScopeTrail finding text or warning annotation.
    validations:
      required: true
  - type: textarea
    id: config-shape
    attributes:
      label: Config shape
      description: Share a redacted snippet or describe the relevant config shape.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Explain whether ScopeTrail should ignore it, lower severity, or recommend a different fix.
    validations:
      required: true
